<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E9D5FF" /> <!-- soft light purple -->
      <stop offset="50%" stop-color="#C7D2FE" /> <!-- lavender blue -->
      <stop offset="100%" stop-color="#93C5FD" /> <!-- sky blue -->
    </linearGradient>
    
    <!-- Word Icon Blue Gradient -->
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF" /> <!-- deep blue -->
      <stop offset="100%" stop-color="#1D4ED8" /> <!-- cobalt blue -->
    </linearGradient>
    
    <!-- Word Plate Gradient -->
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>

    <!-- Arrow Banner Glossy Gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="70%" stop-color="#F8FAFC" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#E2E8F0" stop-opacity="0.95" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadowApp" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#1E1B4B" flood-opacity="0.2" />
    </filter>
    <filter id="shadowPlate" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1E3A8A" flood-opacity="0.3" />
    </filter>
    <filter id="shadowW" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#172554" flood-opacity="0.4" />
    </filter>
    <filter id="shadowArrow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1E293B" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- App Icon Rounded Background (squircle style) -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" filter="url(#shadowApp)" />

  <!-- Underlying Word Document Base Plate (Vertical blue card) -->
  <rect x="150" y="98" width="220" height="280" rx="24" fill="url(#wordGrad)" filter="url(#shadowPlate)" />
  <rect x="150" y="190" width="220" height="90" fill="#1E3A8A" opacity="0.3" /> <!-- decorative band -->

  <!-- Top Arrow/Banner Flow (a^2 + b^2) -->
  <path d="M 230 256 
           C 270 210, 270 140, 400 140 
           L 400 120 
           L 440 160 
           L 400 200 
           L 400 180 
           C 290 180, 280 230, 230 256 Z" 
        fill="url(#arrowGrad)" filter="url(#shadowArrow)" />

  <!-- Bottom Arrow/Banner Flow (\sqrt{c}) -->
  <path d="M 230 256 
           C 270 302, 270 372, 400 372 
           L 400 352 
           L 440 392 
           L 400 432 
           L 400 412 
           C 290 412, 280 362, 230 256 Z" 
        fill="url(#arrowGrad)" filter="url(#shadowArrow)" />

  <!-- Formula 1: a^2 + b^2 -->
  <g transform="translate(320, 168)" fill="#1E3A8A">
    <!-- 'a' (italic serif) -->
    <text x="0" y="0" font-family="'Times New Roman', Times, 'Playfair Display', serif" font-style="italic" font-weight="bold" font-size="28">a</text>
    <!-- '2' (superscript) -->
    <text x="14" y="-12" font-family="'Times New Roman', Times, 'Playfair Display', serif" font-weight="bold" font-size="18">2</text>
    <!-- '+' -->
    <text x="30" y="-2" font-family="'Inter', sans-serif" font-weight="bold" font-size="24">+</text>
    <!-- 'b' (italic serif) -->
    <text x="50" y="0" font-family="'Times New Roman', Times, 'Playfair Display', serif" font-style="italic" font-weight="bold" font-size="28">b</text>
    <!-- '2' (superscript) -->
    <text x="64" y="-12" font-family="'Times New Roman', Times, 'Playfair Display', serif" font-weight="bold" font-size="18">2</text>
  </g>

  <!-- Formula 2: \sqrt{c} -->
  <g transform="translate(346, 396)" fill="#1E3A8A">
    <!-- Radical sign \sqrt -->
    <path d="M -22 -14 L -18 -14 L -13 2 L -5 -24 L 20 -24 L 20 -21 L -2 -21 L -9 6 L -16 6 L -22 -10 Z" fill="#1E3A8A" />
    <!-- 'c' (italic serif) -->
    <text x="0" y="-2" font-family="'Times New Roman', Times, 'Playfair Display', serif" font-style="italic" font-weight="bold" font-size="26">c</text>
  </g>

  <!-- Blue W Plate (Slightly rotated/angled or straight, overlapping the base plate) -->
  <rect x="88" y="156" width="160" height="160" rx="32" fill="url(#plateGrad)" filter="url(#shadowW)" />

  <!-- Giant letter 'W' in white with slight 3D shadow -->
  <text x="112" y="278" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="115" fill="#FFFFFF">W</text>
</svg>
