name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Chạy tự động khi push code lên nhánh main

# Thiết lập quyền hạn (permissions) cần thiết cho GitHub Actions để deploy lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Tránh các deploy chạy song song đè lên nhau
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-name: 'node'
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite App
        run: npm run build
        env:
          # Đọc cấu hình từ GitHub Secrets để bảo mật và cho phép bạn tự kết nối dự án Firebase của riêng mình
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_DATABASE_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Chỉ định thư mục chứa bản build tĩnh của Vite
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
